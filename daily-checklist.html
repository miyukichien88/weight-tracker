<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日打卡">
<title>每日打卡</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --accent: #3D6B4F;
    --accent2: #C17A3A;
    --text: #1C1C1A;
    --muted: #8A8880;
    --border: #E5E2DC;
    --radius: 16px;
    --radius-sm: 10px;
    --check-bg: #EAF3EE;
    --check-done: #3D6B4F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header { padding: 52px 20px 16px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 30px; line-height: 1.1; margin-bottom: 4px; }
  .header-sub { font-size: 13px; color: var(--muted); font-weight: 300; }
  .header-date { font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 2px; }

  /* Progress bar */
  .progress-wrap { margin: 0 16px 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-label span:last-child { color: var(--accent); font-weight: 500; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.4s ease; }

  /* Card */
  .card { background: var(--card); border-radius: var(--radius); padding: 18px 18px; margin: 0 16px 12px; border: 1px solid var(--border); }
  .card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

  /* Checklist item */
  .check-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: opacity 0.15s;
  }
  .check-item:last-of-type { border-bottom: none; padding-bottom: 0; }
  .check-item:first-of-type { padding-top: 0; }
  .check-item:active { opacity: 0.7; }

  .check-box {
    width: 24px; height: 24px; border-radius: 6px;
    border: 1.5px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .check-box.done { background: var(--check-done); border-color: var(--check-done); }
  .check-tick { display: none; color: #fff; font-size: 14px; }
  .check-box.done .check-tick { display: block; }

  .check-label { font-size: 15px; color: var(--text); transition: all 0.2s; flex: 1; }
  .check-label.done { color: var(--muted); text-decoration: line-through; }

  /* Mood selector */
  .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .mood-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 6px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; transition: all 0.15s; -webkit-appearance: none;
  }
  .mood-btn:active { transform: scale(0.95); }
  .mood-btn.selected { border-color: var(--accent); background: var(--check-bg); }
  .mood-emoji { font-size: 22px; }
  .mood-label { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.2; }
  .mood-btn.selected .mood-label { color: var(--accent); font-weight: 500; }

  /* Sleep input */
  .sleep-row { display: flex; align-items: center; gap: 12px; }
  .sleep-row input {
    width: 80px; padding: 10px 12px; font-size: 20px; font-family: 'DM Serif Display', serif;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); text-align: center; -webkit-appearance: none;
  }
  .sleep-row input:focus { outline: none; border-color: var(--accent); }
  .sleep-unit { font-size: 14px; color: var(--muted); }
  .sleep-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Extra food textarea */
  .food-textarea {
    width: 100%; padding: 12px 14px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); resize: none; min-height: 90px;
    line-height: 1.5; -webkit-appearance: none;
  }
  .food-textarea:focus { outline: none; border-color: var(--accent); }
  .food-textarea::placeholder { color: #C8C5BF; }

  /* Save button */
  .btn-save {
    width: calc(100% - 32px); margin: 0 16px; padding: 15px;
    font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; -webkit-appearance: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-save:active { opacity: 0.85; transform: scale(0.99); }

  /* History */
  .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; padding-bottom: 0; }
  .history-item:first-child { padding-top: 0; }
  .history-date { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 300; }
  .history-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .history-checks { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .mini-check { width: 10px; height: 10px; border-radius: 3px; }
  .mini-check.done { background: var(--accent); }
  .mini-check.miss { background: var(--border); }
  .history-score { font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; }
  .history-mood { font-size: 16px; }
  .history-sleep { font-size: 12px; color: var(--muted); }
  .history-food { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .del-btn { background: none; border: none; cursor: pointer; color: var(--border); font-size: 16px; padding: 0 0 0 8px; transition: color 0.15s; }
  .del-btn:active { color: #B94040; }

  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0 20px; margin-bottom: 10px; margin-top: 4px; }

  .saved-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #fff; padding: 10px 24px;
    border-radius: 30px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
  }
  .saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-title">每日打卡</div>
    <div class="header-sub">Hi, KAREN — 今天也加油！</div>
    <div class="header-date" id="today-label"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>今日完成度</span>
      <span id="progress-text">0 / 8</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- Morning -->
  <div class="card">
    <div class="card-title">☀️ 早上</div>
    <div class="check-item" onclick="toggle('morning-weight')">
      <div class="check-box" id="cb-morning-weight"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-morning-weight">量早晨體重</div>
    </div>
    <div class="check-item" onclick="toggle('morning-water')">
      <div class="check-box" id="cb-morning-water"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-morning-water">喝早上那杯水</div>
    </div>
    <div class="check-item" onclick="toggle('plank')">
      <div class="check-box" id="cb-plank"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-plank">平板撐 3 組</div>
    </div>
  </div>

  <!-- Food -->
  <div class="card">
    <div class="card-title">🥗 飲食</div>
    <div class="check-item" onclick="toggle('breakfast')">
      <div class="check-box" id="cb-breakfast"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-breakfast">吃地瓜／水煮蛋／手沖咖啡</div>
    </div>
    <div class="check-item" onclick="toggle('water2000')">
      <div class="check-box" id="cb-water2000"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-water2000">喝足 2000ml 水</div>
    </div>
    <div class="check-item" onclick="toggle('no-carb')">
      <div class="check-box" id="cb-no-carb"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-no-carb">晚上不吃澱粉</div>
    </div>
  </div>

  <!-- Evening -->
  <div class="card">
    <div class="card-title">🌙 晚上</div>
    <div class="check-item" onclick="toggle('evening-weight')">
      <div class="check-box" id="cb-evening-weight"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-evening-weight">量晚上體重</div>
    </div>
    <div class="check-item" onclick="toggle('soymilk')">
      <div class="check-box" id="cb-soymilk"><span class="check-tick">✓</span></div>
      <div class="check-label" id="cl-soymilk">喝黑豆漿／堅果</div>
    </div>

    <!-- Extra food -->
    <div style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);">
      <div style="font-size: 12px; color: var(--muted); margin-bottom: 8px;">📝 今日額外飲食記錄（選填）</div>
      <textarea class="food-textarea" id="extra-food" placeholder="例如：東山鴨頭、鱈魚堡…今天額外吃了什麼都可以寫"></textarea>
    </div>
  </div>

  <!-- Sleep -->
  <div class="card">
    <div class="card-title">😴 睡眠</div>
    <div class="sleep-row">
      <input type="number" id="sleep-hours" placeholder="7" min="1" max="12" step="0.5" inputmode="decimal">
      <span class="sleep-unit">小時</span>
    </div>
    <div class="sleep-hint">建議每天 7–8 小時，睡眠充足有助於減重</div>
  </div>

  <!-- Mood -->
  <div class="card">
    <div class="card-title">😊 今日心情</div>
    <div class="mood-grid">
      <button class="mood-btn" onclick="selectMood('超開心','😄')" id="mood-超開心">
        <span class="mood-emoji">😄</span><span class="mood-label">超開心</span>
      </button>
      <button class="mood-btn" onclick="selectMood('心情很好','🥰')" id="mood-心情很好">
        <span class="mood-emoji">🥰</span><span class="mood-label">心情很好</span>
      </button>
      <button class="mood-btn" onclick="selectMood('還不錯','😊')" id="mood-還不錯">
        <span class="mood-emoji">😊</span><span class="mood-label">還不錯</span>
      </button>
      <button class="mood-btn" onclick="selectMood('平靜放鬆','😌')" id="mood-平靜放鬆">
        <span class="mood-emoji">😌</span><span class="mood-label">平靜放鬆</span>
      </button>
      <button class="mood-btn" onclick="selectMood('普通','😐')" id="mood-普通">
        <span class="mood-emoji">😐</span><span class="mood-label">普通</span>
      </button>
      <button class="mood-btn" onclick="selectMood('有點累','😔')" id="mood-有點累">
        <span class="mood-emoji">😔</span><span class="mood-label">有點累</span>
      </button>
      <button class="mood-btn" onclick="selectMood('很疲憊','😩')" id="mood-很疲憊">
        <span class="mood-emoji">😩</span><span class="mood-label">很疲憊</span>
      </button>
      <button class="mood-btn" onclick="selectMood('有點煩躁','😤')" id="mood-有點煩躁">
        <span class="mood-emoji">😤</span><span class="mood-label">有點煩躁</span>
      </button>
    </div>
  </div>

  <button class="btn-save" onclick="saveDay()">✓ 儲存今日記錄</button>

  <!-- History -->
  <div id="history-area" style="display:none; margin-top: 20px;">
    <div class="section-label">歷史記錄</div>
    <div class="card" id="history-list"></div>
  </div>

</div>

<div class="saved-toast" id="toast">已儲存 ✓</div>

<script>
const $ = id => document.getElementById(id);
const CHECKS = ['morning-weight','morning-water','plank','breakfast','water2000','no-carb','evening-weight','soymilk'];
let state = {};
let selectedMood = '';
let records = [];

try { records = JSON.parse(localStorage.getItem('checklist_v1') || '[]'); } catch(e) {}

// Set today label
const now = new Date();
const todayStr = now.toISOString().split('T')[0];
const weekdays = ['週日','週一','週二','週三','週四','週五','週六'];
$('today-label').textContent = todayStr.replace(/-/g,'/') + ' ' + weekdays[now.getDay()];

// Load today if already saved
const todayRec = records.find(r => r.date === todayStr);
if (todayRec) {
  state = todayRec.checks || {};
  selectedMood = todayRec.mood || '';
  if (todayRec.sleep) $('sleep-hours').value = todayRec.sleep;
  if (todayRec.extraFood) $('extra-food').value = todayRec.extraFood;
  CHECKS.forEach(k => { if (state[k]) applyCheck(k, true); });
  if (selectedMood) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    const moodEl = $('mood-' + selectedMood);
    if (moodEl) moodEl.classList.add('selected');
  }
}

updateProgress();
renderHistory();

function toggle(key) {
  state[key] = !state[key];
  applyCheck(key, state[key]);
  updateProgress();
}

function applyCheck(key, done) {
  const box = $('cb-' + key);
  const label = $('cl-' + key);
  if (done) {
    box.classList.add('done');
    label.classList.add('done');
  } else {
    box.classList.remove('done');
    label.classList.remove('done');
  }
}

function updateProgress() {
  const done = CHECKS.filter(k => state[k]).length;
  const total = CHECKS.length;
  $('progress-text').textContent = done + ' / ' + total;
  $('progress-fill').style.width = (done / total * 100) + '%';
}

function selectMood(label, emoji) {
  selectedMood = label;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  $('mood-' + label).classList.add('selected');
}

function saveDay() {
  const rec = {
    date: todayStr,
    checks: { ...state },
    mood: selectedMood,
    sleep: $('sleep-hours').value || null,
    extraFood: $('extra-food').value.trim() || null
  };
  const idx = records.findIndex(r => r.date === todayStr);
  if (idx >= 0) records[idx] = rec; else records.push(rec);
  try { localStorage.setItem('checklist_v1', JSON.stringify(records)); } catch(e) {}
  showToast();
  renderHistory();
}

function showToast() {
  const t = $('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderHistory() {
  const past = records.filter(r => r.date !== todayStr).sort((a,b) => b.date.localeCompare(a.date));
  if (!past.length) { $('history-area').style.display = 'none'; return; }
  $('history-area').style.display = '';
  const weekdays = ['週日','週一','週二','週三','週四','週五','週六'];
  $('history-list').innerHTML = past.map(r => {
    const done = CHECKS.filter(k => r.checks && r.checks[k]).length;
    const checks = CHECKS.map(k => `<div class="mini-check ${r.checks && r.checks[k] ? 'done' : 'miss'}"></div>`).join('');
    const d = new Date(r.date);
    const label = r.date.replace(/-/g,'/') + ' ' + weekdays[d.getDay()];
    const moodEmojis = {'超開心':'😄','心情很好':'🥰','還不錯':'😊','平靜放鬆':'😌','普通':'😐','有點累':'😔','很疲憊':'😩','有點煩躁':'😤'};
    return `<div class="history-item">
      <div class="history-date">${label}</div>
      <div class="history-row">
        <div class="history-checks">${checks}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${r.mood ? `<span class="history-mood">${moodEmojis[r.mood]||''}</span>` : ''}
          ${r.sleep ? `<span class="history-sleep">😴${r.sleep}h</span>` : ''}
          <span class="history-score">${done}/${CHECKS.length}</span>
          <button class="del-btn" onclick="delRecord('${r.date}')">×</button>
        </div>
      </div>
      ${r.extraFood ? `<div class="history-food">📝 ${r.extraFood}</div>` : ''}
    </div>`;
  }).join('');
}

function delRecord(date) {
  if (!confirm('刪除 ' + date + ' 的記錄？')) return;
  records = records.filter(r => r.date !== date);
  try { localStorage.setItem('checklist_v1', JSON.stringify(records)); } catch(e) {}
  renderHistory();
}
</script>
</body>
</html>
