<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0a1a">
<title>瑪雅流日 · Kin 45</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0a1a;
  --bg2: #13102a;
  --bg3: #1a1630;
  --card: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --purple-light: #c4b8ff;
  --purple: #9d8df5;
  --purple-dark: #6b5ce7;
  --gold: #f0c060;
  --gold-dim: #a8843a;
  --teal: #5ddbb4;
  --red: #ff7e7e;
  --white: #f0eeff;
  --muted: rgba(200,190,255,0.5);
  --font-serif: 'Noto Serif TC', serif;
  --font-display: 'Cinzel', serif;
  --font-body: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-body);
  overflow-x: hidden;
}

/* Star background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(109,80,220,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(80,180,150,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(20,10,50,0.9) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--dur) ease-in-out infinite;
  opacity: 0;
}
@keyframes twinkle {
  0%,100%{opacity:0} 50%{opacity:var(--op)}
}

.page {
  position: relative;
  z-index: 1;
  max-width: 440px;
  margin: 0 auto;
  padding: 0 0 4rem;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 2.5rem 1.5rem 1.5rem;
  position: relative;
}
.header-symbol {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .3em;
  color: var(--purple);
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: .8;
}
.header-date {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--white);
  font-weight: 600;
  margin-bottom: 4px;
}
.header-weekday {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 1.5rem;
}
.nav-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.nav-btn {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 20px;
  color: var(--purple-light);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 6px 18px;
  cursor: pointer;
  transition: background .2s;
}
.nav-btn:hover, .nav-btn:active { background: rgba(255,255,255,0.1); }
.today-btn {
  background: rgba(157,141,245,0.15);
  border-color: var(--purple-dark);
  color: var(--purple-light);
  font-size: 12px;
  padding: 5px 14px;
}

/* My Kin Banner */
.my-kin {
  margin: 0 1.2rem 1.2rem;
  background: linear-gradient(135deg, rgba(107,92,231,0.25), rgba(80,180,150,0.15));
  border: 0.5px solid rgba(157,141,245,0.4);
  border-radius: 16px;
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 14px;
}
.my-kin-num {
  font-family: var(--font-display);
  font-size: 38px;
  color: var(--purple-light);
  line-height: 1;
  min-width: 60px;
  text-align: center;
}
.my-kin-info {}
.my-kin-title {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 3px;
}
.my-kin-sub {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* Daily Kin Card */
.daily-card {
  margin: 0 1.2rem 1.2rem;
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 20px;
  padding: 1.4rem 1.3rem;
  position: relative;
  overflow: hidden;
}
.daily-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(157,141,245,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.dc-label {
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 12px;
  font-family: var(--font-display);
}
.dc-main-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 14px;
}
.dc-glyph {
  font-size: 44px;
  line-height: 1;
  filter: drop-shadow(0 0 12px rgba(157,141,245,0.6));
}
.dc-kin-num {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--purple);
  letter-spacing: .1em;
  margin-bottom: 4px;
}
.dc-seal-name {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 3px;
}
.dc-seal-en {
  font-size: 12px;
  color: var(--muted);
}
.dc-color-tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  margin-top: 5px;
}
.color-red { background: rgba(255,126,126,0.2); color: var(--red); border: 0.5px solid rgba(255,126,126,0.3); }
.color-white { background: rgba(255,255,255,0.1); color: #ddd; border: 0.5px solid rgba(255,255,255,0.2); }
.color-blue { background: rgba(93,219,180,0.15); color: var(--teal); border: 0.5px solid rgba(93,219,180,0.3); }
.color-yellow { background: rgba(240,192,96,0.15); color: var(--gold); border: 0.5px solid rgba(240,192,96,0.3); }

.divider { height: 0.5px; background: var(--card-border); margin: 14px 0; }

.dc-tone-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.dc-tone-badge {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--gold);
  min-width: 32px;
}
.dc-tone-info {}
.dc-tone-name {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--gold);
}
.dc-tone-kw {
  font-size: 12px;
  color: var(--muted);
  margin-top: 1px;
}
.pip-row {
  display: flex;
  gap: 5px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 0.5px solid rgba(255,255,255,0.2);
  transition: background .3s;
}
.pip.on { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 6px rgba(240,192,96,0.5); }

.dc-desc {
  font-size: 14px;
  line-height: 1.85;
  color: rgba(220,210,255,0.85);
  font-family: var(--font-serif);
}

/* Wave */
.wave-section {
  margin-top: 14px;
}
.wave-lbl {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .08em;
  margin-bottom: 8px;
}
.wave-cells {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.wc {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  border: 0.5px solid rgba(255,255,255,0.1);
  color: var(--muted);
  background: rgba(255,255,255,0.04);
}
.wc.active-wc {
  background: rgba(240,192,96,0.2);
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 8px rgba(240,192,96,0.3);
}

/* Resonance card */
.resonance-card {
  margin: 0 1.2rem 1.2rem;
  background: linear-gradient(135deg, rgba(93,219,180,0.08), rgba(107,92,231,0.1));
  border: 0.5px solid rgba(93,219,180,0.3);
  border-radius: 16px;
  padding: 1rem 1.2rem;
  display: none;
}
.resonance-label {
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--teal);
  margin-bottom: 8px;
  font-family: var(--font-display);
}
.resonance-text {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(200,255,235,0.85);
  font-family: var(--font-serif);
}

/* Taurus */
.taurus-card {
  margin: 0 1.2rem 1.2rem;
  background: rgba(240,192,96,0.06);
  border: 0.5px solid rgba(240,192,96,0.25);
  border-radius: 20px;
  padding: 1.3rem;
}
.taurus-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.taurus-symbol {
  font-size: 26px;
  filter: drop-shadow(0 0 8px rgba(240,192,96,0.4));
}
.taurus-title {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--gold);
  letter-spacing: .08em;
}
.taurus-sub {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 2px;
}
.taurus-text {
  font-size: 14px;
  line-height: 1.85;
  color: rgba(255,235,180,0.8);
  font-family: var(--font-serif);
}

/* Oracle section */
.oracle-section {
  margin: 0 1.2rem 1.2rem;
}
.oracle-title {
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--muted);
  font-family: var(--font-display);
  margin-bottom: 10px;
  padding-left: 2px;
}
.oracle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.oracle-cell {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 12px;
  padding: .75rem .9rem;
}
.oc-role {
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--muted);
  margin-bottom: 4px;
}
.oc-val {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--white);
}
.oc-kin {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 1rem 1rem;
  font-size: 11px;
  color: rgba(200,190,255,0.3);
  letter-spacing: .1em;
}
</style>
</head>

(function(){
  const c = document.getElementById('stars');

function getOracleKins(kin) {
  // Guide: same color family, higher tone in wavespell
  const {tone, seal} = kinToSealTone(kin);
  // Guide power: tone determines which seal in same color family
  const colorMap = [0,5,10,15,9,14,19,4,8,13,18,3,7,12,17,2,6,11,16,1]; // simplified
  const guide = ((kin - 1 + 52) % 260) + 1; // approximate
  const antipode = ((kin - 1 + 130) % 260) + 1;
  const analog = ((kin - 1 + 20) % 260) + 1;
  const hidden = ((260 - kin) % 260) + 1;
  return [guide, analog, antipode, hidden];
}

function kinToSealTone(kin) {
  return { tone: ((kin-1)%13)+1, seal: ((kin-1)%20) };
}

function dateToKin(d) {
  const anchor = new Date(1983,3,28);
  const diff = Math.round((d-anchor)/86400000);
  return ((44+diff)%260+260)%260+1;
}

let offset = 0;

function getDate() {
  const d = new Date();
  d.setDate(d.getDate()+offset);
  d.setHours(0,0,0,0);
  return d;
}

function fmt(d) {
  const w = ['日','一','二','三','四','五','六'];
  return {
    date: d.getFullYear()+' / '+String(d.getMonth()+1).padStart(2,'0')+' / '+String(d.getDate()).padStart(2,'0'),
    week: '週'+w[d.getDay()]
  };
}
